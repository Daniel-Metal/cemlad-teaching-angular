<header class="bg-slate-900 border-b border-slate-800 shadow-lg sticky top-0 z-40">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <!-- Brand -->
      <a routerLink="/" class="flex items-center gap-3 group">
        <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/40 group-hover:bg-indigo-500 transition-colors duration-200">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
          </svg>
        </div>
        <div class="leading-none">
          <span class="text-white font-bold text-base block">CEMLAD</span>
          <span class="text-indigo-400 text-xs">Shop Manager</span>
        </div>
      </a>

      <!-- Navigation -->
      <nav class="flex items-center gap-1">
        <a routerLink="/products"
           routerLinkActive="bg-indigo-600/25 text-indigo-300 border-indigo-500/40"
           [routerLinkActiveOptions]="{exact: false}"
           class="flex items-center gap-2 px-4 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/8 transition-all duration-200 text-sm font-medium border border-transparent">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
          Productos
        </a>
        <a routerLink="/carts"
           routerLinkActive="bg-indigo-600/25 text-indigo-300 border-indigo-500/40"
           [routerLinkActiveOptions]="{exact: false}"
           class="flex items-center gap-2 px-4 py-2 rounded-xl text-slate-400 hover:text-white hover:bg-white/8 transition-all duration-200 text-sm font-medium border border-transparent">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
          </svg>
          Carritos
        </a>
      </nav>
    </div>
  </div>
</header>
