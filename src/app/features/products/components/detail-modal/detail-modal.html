@if (show && product) {
  <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4"
       (click)="close.emit()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden"
         (click)="$event.stopPropagation()">

      <!-- Modal Header gradient -->
      <div class="bg-linear-to-br from-indigo-500 to-indigo-700 p-6 relative">
        <button (click)="close.emit()"
                class="absolute top-4 right-4 w-8 h-8 bg-white/20 hover:bg-white/30 rounded-xl flex items-center justify-center transition-colors">
          <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
        <div class="flex items-center gap-4">
          <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center">
            <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
          </div>
          <div>
            <p class="text-indigo-200 text-xs font-medium uppercase tracking-wider">Detalle del Producto</p>
            <h2 class="text-white font-bold text-lg leading-tight mt-0.5">{{ product.name }}</h2>
          </div>
        </div>
      </div>

      <!-- Modal Body -->
      <div class="p-6 space-y-1">
        <div class="flex items-center justify-between py-3 border-b border-slate-100">
          <span class="text-sm text-slate-500 font-medium">ID del Producto</span>
          <span class="text-sm font-semibold text-slate-900 bg-slate-100 px-3 py-1 rounded-lg">#{{ product.id }}</span>
        </div>
        <div class="flex items-center justify-between py-3 border-b border-slate-100">
          <span class="text-sm text-slate-500 font-medium">Código SKU</span>
          <span class="text-sm font-mono font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg">{{ product.code }}</span>
        </div>
        <div class="flex items-center justify-between py-3 border-b border-slate-100">
          <span class="text-sm text-slate-500 font-medium">Nombre</span>
          <span class="text-sm font-semibold text-slate-900 text-right max-w-[60%] leading-snug">{{ product.name }}</span>
        </div>
        <div class="flex items-center justify-between py-3">
          <span class="text-sm text-slate-500 font-medium">Precio unitario</span>
          <span class="text-xl font-bold text-emerald-600">{{ product.price | currency:'USD' }}</span>
        </div>
      </div>

      <!-- Modal Footer -->
      <div class="px-6 pb-6">
        <button (click)="close.emit()"
                class="w-full py-2.5 bg-slate-900 hover:bg-slate-800 text-white rounded-xl text-sm font-medium transition-colors">
          Cerrar
        </button>
      </div>
    </div>
  </div>
}
