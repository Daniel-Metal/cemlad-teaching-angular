@if (show) {
  <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4"
       (click)="onClose()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden"
         (click)="$event.stopPropagation()">

      <!-- Modal Header -->
      <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center"
               [class]="isEdit ? 'bg-amber-100' : 'bg-indigo-100'">
            @if (isEdit) {
              <svg class="w-5 h-5 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
              </svg>
            } @else {
              <svg class="w-5 h-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
              </svg>
            }
          </div>
          <h2 class="text-lg font-semibold text-slate-900">
            {{ isEdit ? 'Editar Producto' : 'Nuevo Producto' }}
          </h2>
        </div>
        <button (click)="onClose()"
                class="w-8 h-8 bg-slate-100 hover:bg-slate-200 rounded-xl flex items-center justify-center transition-colors">
          <svg class="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Form -->
      <form class="px-6 py-5 space-y-4" (ngSubmit)="onSubmit()">
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">
            Nombre del Producto <span class="text-rose-500">*</span>
          </label>
          <input type="text" name="name" [(ngModel)]="formName"
                 placeholder="Ej: Laptop Dell XPS 15"
                 class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-slate-50/50"/>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">
            Código SKU <span class="text-rose-500">*</span>
          </label>
          <input type="text" name="code" [(ngModel)]="formCode"
                 placeholder="Ej: SKU-001"
                 class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm text-slate-900 placeholder-slate-400 font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-slate-50/50"/>
          <p class="mt-1 text-xs text-slate-400">Máximo 50 caracteres. Identificador único del producto.</p>
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1.5">
            Precio Unitario (USD) <span class="text-rose-500">*</span>
          </label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm font-medium pointer-events-none">$</span>
            <input type="number" name="price" [(ngModel)]="formPrice"
                   placeholder="0.00" step="0.01" min="0"
                   class="w-full pl-8 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-slate-50/50"/>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-3 pt-2">
          <button type="button" (click)="onClose()"
                  class="flex-1 px-4 py-2.5 border border-slate-200 text-slate-700 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors">
            Cancelar
          </button>
          <button type="submit"
                  class="flex-1 px-4 py-2.5 text-white rounded-xl text-sm font-medium transition-colors shadow-sm"
                  [class]="isEdit ? 'bg-amber-500 hover:bg-amber-600' : 'bg-indigo-600 hover:bg-indigo-700'">
            {{ isEdit ? 'Guardar Cambios' : 'Crear Producto' }}
          </button>
        </div>
      </form>
    </div>
  </div>
}
