@if (show) {
  <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4"
       (click)="close.emit()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden"
         (click)="$event.stopPropagation()">

      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-5 border-b border-slate-100">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 bg-indigo-100 rounded-xl flex items-center justify-center">
            <svg class="w-5 h-5 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
            </svg>
          </div>
          <div>
            <h2 class="text-lg font-semibold text-slate-900">Agregar Producto</h2>
            <p class="text-xs text-slate-400 mt-0.5">Selecciona un producto del catalogo</p>
          </div>
        </div>
        <button (click)="close.emit()"
                class="w-8 h-8 bg-slate-100 hover:bg-slate-200 rounded-xl flex items-center justify-center transition-colors">
          <svg class="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Product List -->
      <div class="divide-y divide-slate-100 max-h-[60vh] overflow-y-auto">
        @for (product of products; track product.id) {
          <div class="flex items-center gap-4 px-6 py-4 hover:bg-slate-50 transition-colors">
            <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <p class="font-medium text-slate-900 text-sm truncate">{{ product.name }}</p>
              <p class="text-xs text-slate-500 font-mono mt-0.5">{{ product.code }}</p>
            </div>
            <span class="font-bold text-indigo-600 text-sm flex-shrink-0">{{ product.price | currency:'USD' }}</span>
            @if (isAlreadyAdded(product.id)) {
              <span class="px-3 py-1.5 text-xs font-medium bg-slate-100 text-slate-400 rounded-xl flex-shrink-0 cursor-not-allowed">
                Ya agregado
              </span>
            } @else {
              <button (click)="onAdd(product)"
                      class="px-3 py-1.5 text-xs font-medium bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl flex-shrink-0 transition-colors">
                Agregar
              </button>
            }
          </div>
        }
      </div>

      <!-- Footer -->
      <div class="px-6 py-4 border-t border-slate-100 bg-slate-50/50">
        <button (click)="close.emit()"
                class="w-full py-2.5 border border-slate-200 text-slate-700 rounded-xl text-sm font-medium hover:bg-white transition-colors">
          Cerrar
        </button>
      </div>
    </div>
  </div>
}
