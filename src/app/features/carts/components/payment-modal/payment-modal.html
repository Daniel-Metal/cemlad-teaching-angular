@if (show && cart) {
  <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4"
       (click)="onClose()">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden"
         (click)="$event.stopPropagation()">

      <!-- Header -->
      <div class="bg-linear-to-br from-slate-900 to-slate-800 px-6 py-5">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-slate-400 text-xs font-medium uppercase tracking-wider">Procesar Pago</p>
            <h2 class="text-white font-bold text-lg mt-0.5">Carrito #{{ cart.id }}</h2>
          </div>
          <button (click)="onClose()"
                  class="w-8 h-8 bg-white/10 hover:bg-white/20 rounded-xl flex items-center justify-center transition-colors">
            <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <!-- Total -->
        <div class="mt-4 bg-white/10 rounded-xl px-4 py-3 flex items-center justify-between">
          <span class="text-slate-300 text-sm">Total a pagar</span>
          <span class="text-white font-bold text-2xl">{{ cart.total | currency:'USD' }}</span>
        </div>
      </div>

      <!-- Payment Methods -->
      <div class="px-6 py-5 space-y-3">
        <p class="text-xs font-semibold text-slate-600 uppercase tracking-wider mb-3">Selecciona el método de pago</p>

        <!-- Cash -->
        <button (click)="selectMethod('CASH')"
                class="w-full flex items-center gap-4 p-4 rounded-xl border-2 transition-all duration-200"
                [class]="selectedMethod === 'CASH' ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200 hover:border-slate-300 bg-white'">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0"
               [class]="selectedMethod === 'CASH' ? 'bg-emerald-500' : 'bg-slate-100'">
            <svg class="w-6 h-6" [class]="selectedMethod === 'CASH' ? 'text-white' : 'text-slate-500'"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
            </svg>
          </div>
          <div class="text-left">
            <p class="font-semibold text-slate-900 text-sm">Efectivo</p>
            <p class="text-xs text-slate-500 mt-0.5">Pago en efectivo al momento de la entrega</p>
          </div>
          @if (selectedMethod === 'CASH') {
            <div class="ml-auto w-5 h-5 bg-emerald-500 rounded-full flex items-center justify-center flex-shrink-0">
              <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          }
        </button>

        <!-- Card -->
        <button (click)="selectMethod('CARD')"
                class="w-full flex items-center gap-4 p-4 rounded-xl border-2 transition-all duration-200"
                [class]="selectedMethod === 'CARD' ? 'border-indigo-500 bg-indigo-50' : 'border-slate-200 hover:border-slate-300 bg-white'">
          <div class="w-12 h-12 rounded-xl flex items-center justify-center flex-shrink-0"
               [class]="selectedMethod === 'CARD' ? 'bg-indigo-500' : 'bg-slate-100'">
            <svg class="w-6 h-6" [class]="selectedMethod === 'CARD' ? 'text-white' : 'text-slate-500'"
                 fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
            </svg>
          </div>
          <div class="text-left">
            <p class="font-semibold text-slate-900 text-sm">Tarjeta</p>
            <p class="text-xs text-slate-500 mt-0.5">Débito o crédito, procesamiento seguro</p>
          </div>
          @if (selectedMethod === 'CARD') {
            <div class="ml-auto w-5 h-5 bg-indigo-500 rounded-full flex items-center justify-center flex-shrink-0">
              <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
          }
        </button>
      </div>

      <!-- Footer -->
      <div class="px-6 pb-6 flex gap-3">
        <button (click)="onClose()"
                class="flex-1 px-4 py-2.5 border border-slate-200 text-slate-700 rounded-xl text-sm font-medium hover:bg-slate-50 transition-colors">
          Cancelar
        </button>
        <button (click)="onPay()" [disabled]="!selectedMethod"
                class="flex-1 px-4 py-2.5 bg-slate-900 hover:bg-slate-800 disabled:opacity-40 disabled:cursor-not-allowed text-white rounded-xl text-sm font-medium transition-colors shadow-sm flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Confirmar Pago
        </button>
      </div>
    </div>
  </div>
}
